name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test
        env:
          VAULT_ENCRYPTION_KEY: ${{ secrets.VAULT_ENCRYPTION_KEY }}

  check-shellgate-secrets:
    name: Check shellgate-secrets package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for package changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^packages/shellgate-secrets/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify npm version is bumped
        if: steps.changes.outputs.changed == 'true'
        run: |
          LOCAL_VERSION=$(node -p "require('./packages/shellgate-secrets/package.json').version")
          NPM_VERSION=$(npm view shellgate-secrets version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
            echo "::warning::packages/shellgate-secrets/ has changes but version ($LOCAL_VERSION) matches npm. Bump the version and run: cd packages/shellgate-secrets && npm publish"
          else
            echo "Version bumped: $NPM_VERSION -> $LOCAL_VERSION (remember to publish)"
          fi
